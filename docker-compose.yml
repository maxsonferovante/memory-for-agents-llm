services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
    volumes:
      - local-memory-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: local_stack/api
      dockerfile: Dockerfile
    environment:
      MEMORY_DATABASE_URL: postgresql://memory:memory@postgres:5432/memory
      MEMORY_DATA_DIR: /data
      MEMORY_RAW_DIR: /data/raw
      MEMORY_DERIVED_DIR: /data/derived
      MEMORY_INDEX_PATH: /data/derived/index.json
      MEMORY_API_BIND: 0.0.0.0:8081
    volumes:
      - local-memory-data:/data
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: local_stack/worker/Dockerfile
    environment:
      MEMORY_DATABASE_URL: postgresql://memory:memory@postgres:5432/memory
      MEMORY_DATA_DIR: /data
      MEMORY_RAW_DIR: /data/raw
      MEMORY_DERIVED_DIR: /data/derived
      MEMORY_INDEX_PATH: /data/derived/index.json
      MEMORY_WORKER_POLL_SECONDS: "1.0"
    volumes:
      - local-memory-data:/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  mcp-server:
    build:
      context: local_stack/mcp-server
    environment:
      MEMORY_INDEX_PATH: /data/derived/index.json
    volumes:
      - local-memory-data:/data
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - worker

volumes:
  local-memory-data:
  local-memory-postgres:
