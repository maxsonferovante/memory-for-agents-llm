# Project-scoped Codex configuration for memory-for-agents-llm.
# Codex loads this file only after the project .codex/ layer is trusted.

model = "gpt-5.4"
model_reasoning_effort = "medium"

[features]
hooks = true

[agents]
# Keep enough room for one coordinator plus focused specialist subagents.
max_threads = 4
# Keep delegation shallow and predictable; child agents should not fan out again.
max_depth = 1
job_max_runtime_seconds = 1800

[mcp_servers.localMemory]
url = "http://127.0.0.1:8080/mcp"
startup_timeout_sec = 30
tool_timeout_sec = 60
enabled = true
required = false
default_tools_approval_mode = "auto"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
startup_timeout_sec = 15
tool_timeout_sec = 60
enabled = true
required = false
default_tools_approval_mode = "auto"
