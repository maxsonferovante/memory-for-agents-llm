name: Auto-open PR for feature branches

on:
  create:
  push:
    branches:
      - "feature/*"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-open-pr-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  open-pr:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'create' && github.event.ref_type == 'branch' && startsWith(github.event.ref, 'feature/'))
      || (github.event_name == 'push' && startsWith(github.ref_name, 'feature/'))

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip when PR automation token is not configured
        if: ${{ secrets.PR_AUTOMATION_TOKEN == '' }}
        run: |
          echo "::notice::PR automation token is not configured, so this run will not create a pull request."

      - name: Open pull request if needed
        if: ${{ secrets.PR_AUTOMATION_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_AUTOMATION_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const rawRef = context.payload.ref || context.ref || '';
            const branch = rawRef.replace(/^refs\/heads\//, '');

            if (!branch.startsWith('feature/')) {
              core.notice(`Skipping non-feature branch: ${branch}`);
              return;
            }

            const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
            const base = repoInfo.default_branch;
            const head = `${owner}:${branch}`;

            const { data: openPRs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              per_page: 100,
            });

            if (openPRs.length > 0) {
              core.notice(`Pull request already exists: #${openPRs[0].number}`);
              return;
            }

            const templatePath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'pull_request_template.md');
            const fallbackBody = [
              '## Resumo',
              '',
              'Descreva o objetivo desta branch.',
              '',
              '## Contexto',
              '',
              `- Branch: \`${branch}\``,
              `- Base: \`${base}\``,
              '',
              '## Testes',
              '',
              '- [ ] Descreva os testes executados',
              '',
              '## Riscos',
              '',
              '- [ ] Descreva riscos e impacto',
              '',
              '## Checklist',
              '',
              '- [ ] Revisado',
              '- [ ] Documentação e memória atualizadas, se necessário',
            ].join('\n');

            const body = fs.existsSync(templatePath)
              ? fs.readFileSync(templatePath, 'utf8')
              : fallbackBody;

            const branchLabel = branch.replace(/^feature\//, '');
            const normalizedTitle = branchLabel
              .replace(/[\/_-]+/g, ' ')
              .trim()
              .replace(/\b\w/g, (char) => char.toUpperCase());
            const title = normalizedTitle ? `feat: ${normalizedTitle}` : `feat: ${branch}`;

            await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base,
              body,
              draft: false,
            });

            core.notice(`Created pull request for ${branch} -> ${base}`);
